<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Cogniva</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/main.js" defer></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>

<body class="auth-page">
    <div class="auth-container">
        <aside class="brand-panel">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png" alt="Cogniva Logo" class="logo-icon">
                <span>Cogniva</span>
            </a>
            <div class="brand-content">
                <h1>Start your cognitive<br>upgrade.</h1>
                <p>Create your Cogniva account and begin intelligent tracking.</p>
                <a href="../index.html" class="btn-back">Back to Home</a>
            </div>
        </aside>

        <main class="form-panel">
            <div class="auth-card register">
                <h2>Create Account</h2>
                <form action="#">
                    <div class="form-group">
                        <input type="text" id="fullname" placeholder=" " required>
                        <label for="fullname">Full Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email">Email Address</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder=" " required
                            oninput="checkStrength(this.value)">
                        <label for="password">Password</label>
                    </div>

                    <div class="strength-container">
                        <div class="strength-bar" id="strength-bar">
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                        </div>
                        <div class="strength-text" id="strength-text">Password Strength</div>
                    </div>

                    <div class="form-group">
                        <input type="password" id="confirm" placeholder=" " required>
                        <label for="confirm">Confirm Password</label>
                    </div>

                    <button type="submit" class="btn-auth">Create Account</button>
                    <div class="trust-text">Join 10,000+ cognitive optimizers.</div>

                    <p class="terms-text">
                        By creating an account, you agree to our <a href="coming-soon.html" class="link">Terms</a> & <a
                            href="coming-soon.html" class="link">Privacy Policy</a>.
                    </p>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html" class="link">Log in</a>
                </div>
            </div>
        </main>
    </div>


</body>

</html>
