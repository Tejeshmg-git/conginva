<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cogniva</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/main.js" defer></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
</head>

<body class="auth-page">
    <div class="auth-container">
        <aside class="brand-panel">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png" alt="Cogniva Logo" class="logo-icon">
                <span>Cogniva</span>
            </a>
            <div class="brand-content">
                <h1>Welcome back.</h1>
                <p>Continue your cognitive optimization journey.</p>
                <ul class="benefits-list">
                    <li>Track your supplement stack</li>
                    <li>Visualize your progress</li>
                    <li>Stay consistent</li>
                </ul>
                <a href="../index.html" class="btn-back">Back to Home</a>
            </div>
        </aside>

        <main class="form-panel">
            <div class="auth-card">
                <h2>Log In</h2>
                <form action="#">
                    <div class="form-group">
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email">Email Address</label>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder=" " required>
                        <label for="password">Password</label>
                    </div>
                    <div class="form-extras">
                        <label class="checkbox-group">
                            <input type="checkbox">
                            Remember me
                        </label>
                        <a href="coming-soon.html" class="link">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-auth">Log In</button>
                    <span class="trust-text">Secure. Private. Optimized.</span>
                </form>

                <div class="auth-footer">
                    Don’t have an account? <a href="register.html" class="link">Create one</a>
                </div>
            </div>
        </main>
    </div>


</body>

</html>
